<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết sách</title>
    <link rel="stylesheet" href="Chitietsanpham.css">
</head>
<body>

<div class="product-container">
    
    <!-- Ảnh sách -->
    <div class="product-image">
        <img src="https://via.placeholder.com/300" alt="Book">
    </div>

    <!-- Thông tin -->
    <div class="product-info">
        <h1>Yêu Lại Từ Đầu</h1>
        <p><strong>Tác giả:</strong> Nhiều tác giả</p>
        <p><strong>Thể loại:</strong> Văn học</p>

        <p class="price">120.000đ</p>

        <button class="buy-btn">Mua ngay</button>
    </div>

</div>

<!-- Mô tả -->
<div class="description">
    <h2>Mô tả sản phẩm</h2>
    <p>
        Đây là cuốn sách giúp bạn khám phá lại cảm xúc trong văn học,
        mang đến góc nhìn sâu sắc về nghệ thuật trong văn xuôi.
    </p>
</div>

</body>
</html>
