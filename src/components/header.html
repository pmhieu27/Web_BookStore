<!-- ═══════════════════════════════════════════════════════════
     HEADER — Vane Vietnam
     Desktop (≥1024px): Logo giữa, links trái, icons phải, navbar danh mục
     Mobile  (<1024px) : Hamburger trái, logo giữa, icons phải, ẩn links & navbar
     ═══════════════════════════════════════════════════════════ -->

<header id="main-header" class="fixed top-0 left-0 right-0 z-50 transition-all duration-150 header-transparent">

  <!-- ── TOP BAR ── -->
  <div id="top-bar" class="border-b transition-colors duration-150">
    <div class="w-full flex items-center justify-between px-4 sm:px-8 md:px-16 lg:px-24 py-3">

      <!-- LEFT: Hamburger (mobile) + Text links (desktop) -->
      <div class="flex-1 flex justify-start items-center gap-4 md:gap-6">

        <!-- Hamburger — chỉ hiện khi < lg (1024px) -->
        <button id="menu-btn" class="block lg:hidden cursor-pointer hover:text-gold transition-transform hover:scale-110" aria-label="Mở menu">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 6h18"></path>
            <path d="M3 12h18"></path>
            <path d="M3 18h18"></path>
          </svg>
        </button>

        <!-- Desktop links — ẩn khi < lg, hiện khi ≥ lg -->
        <a href="about.html"    class="hidden lg:inline-block gold-underline font-ui text-[11px] uppercase tracking-widest hover:text-gold transition-colors">Về Chúng Tôi</a>
        <a href="contact.html"  class="hidden lg:inline-block gold-underline font-ui text-[11px] uppercase tracking-widest hover:text-gold transition-colors">Liên Hệ</a>
        <a href="services.html" class="hidden lg:inline-block gold-underline font-ui text-[11px] uppercase tracking-widest hover:text-gold transition-colors">Chính Sách</a>
      </div>

      <!-- CENTER: Logo -->
      <div class="flex-shrink-0 flex justify-center">
        <a href="index.html" class="font-logo text-2xl sm:text-3xl md:text-5xl flex flex-col items-center tracking-widest text-center leading-none">
          Vane
          <span class="font-sans text-[8px] sm:text-[10px] uppercase font-light tracking-[0.3em] mt-1">Vietnam</span>
        </a>
      </div>

      <!-- RIGHT: Icon buttons -->
      <div class="flex-1 flex justify-end items-center gap-4 md:gap-7">
        <!-- Search -->
        <button id="search-btn" class="cursor-pointer hover:text-gold-light transition-transform hover:scale-110" aria-label="Tìm kiếm">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 3a8 8 0 1 0 0 16 8 8 0 0 0 0-16z"></path>
            <path d="M21 21l-4.35-4.35"></path>
          </svg>
        </button>
        <!-- Wishlist (ẩn mobile nhỏ) -->
        <a href="wishlist.html" class="hidden md:block hover:text-gold-light transition-transform hover:scale-110" aria-label="Yêu thích">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
          </svg>
        </a>
        <!-- Account (ẩn mobile nhỏ) -->
        <a href="account.html" class="hidden md:block hover:text-gold-light transition-transform hover:scale-110" aria-label="Tài khoản">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <path d="M12 3a4 4 0 1 0 0 8 4 4 0 0 0 0-8z"></path>
          </svg>
        </a>
        <!-- Cart -->
        <button id="cart-btn" class="relative hover:text-gold-light transition-transform hover:scale-110 cursor-pointer" aria-label="Giỏ hàng">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
            <path d="M3 6h18"></path>
            <path d="M16 10a4 4 0 0 1-8 0"></path>
          </svg>
          <span id="cart-badge" class="absolute -top-1.5 -right-2 bg-gold text-white text-[9px] font-bold w-4 h-4 text-center leading-4 rounded-full hidden">0</span>
        </button>
        <!-- Logout -->
        <button id="logout-btn" class="hidden md:block hover:text-gold-light transition-transform hover:scale-110 cursor-pointer" aria-label="Đăng xuất">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <path d="M16 17l5-5-5-5"></path>
            <path d="M21 12H9"></path>
          </svg>
        </button>
      </div>

    </div>
  </div>

  <!-- ── NAVIGATION BAR — chỉ hiện trên desktop (≥ lg) ── -->
  <nav id="nav-bar" class="hidden lg:block border-b transition-colors duration-150">
    <div class="w-full px-4 md:px-16 lg:px-20">
      <ul class="flex items-center justify-center gap-8 py-1">
        <li><a href="collections.html" class="gold-underline font-ui text-[11px] uppercase tracking-widest hover:text-gold transition-colors">Bộ Sưu Tập</a></li>
        <li><a href="collections.html?category=rings" class="gold-underline font-ui text-[11px] uppercase tracking-widest hover:text-gold transition-colors">Nhẫn</a></li>
        <li><a href="collections.html?category=necklaces" class="gold-underline font-ui text-[11px] uppercase tracking-widest hover:text-gold transition-colors">Dây Chuyền</a></li>
        <li><a href="collections.html?category=bracelets" class="gold-underline font-ui text-[11px] uppercase tracking-widest hover:text-gold transition-colors">Vòng Tay</a></li>
        <li><a href="collections.html?category=earrings" class="gold-underline font-ui text-[11px] uppercase tracking-widest hover:text-gold transition-colors">Hoa Tai</a></li>
      </ul>
    </div>
  </nav>

</header>


<!-- ═══════════════════════════════════════════════════════════
     SEARCH OVERLAY
     ═══════════════════════════════════════════════════════════ -->
<div id="search-overlay" class="fixed inset-0 z-[120] bg-white/95 backdrop-blur-md flex items-center justify-center transition-all duration-300 opacity-0 invisible">
  <button id="search-close" class="absolute top-6 right-8 text-4xl font-light text-muted hover:text-primary transition-colors cursor-pointer" aria-label="Đóng">&times;</button>
  <div class="w-full max-w-3xl px-6">
    <div class="relative">
      <input type="text" id="search-input" placeholder="Tìm kiếm sản phẩm..." class="w-full bg-transparent border-b-2 border-silver text-2xl md:text-4xl py-4 pr-12 focus:outline-none focus:border-gold transition-colors font-serif placeholder:text-silver-light">
      <button class="absolute right-0 top-1/2 -translate-y-1/2 text-2xl text-muted hover:text-gold transition-colors cursor-pointer" aria-label="Tìm">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 3a8 8 0 1 0 0 16 8 8 0 0 0 0-16z"></path>
          <path d="M21 21l-4.35-4.35"></path>
        </svg>
      </button>
    </div>
  </div>
</div>
