<!doctype html>
<html lang="vi" class="scroll-smooth">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Thanh Toán | Vane Vietnam</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💎</text></svg>">
  <link rel="stylesheet" href="src/css/base.css?v=30" />
  <link rel="stylesheet" href="src/css/output.css?v=30" />
  <link rel="stylesheet" href="src/css/custom.css?v=30" />
</head>
<body class="bg-ivory text-charcoal font-sans opacity-0 transition-opacity duration-500">

  <div id="loader" class="fixed inset-0 z-200 bg-ivory flex items-center justify-center"><div class="font-logo text-2xl tracking-[0.4em]">VANE</div></div>
  <div id="component-header"></div>

  <main>
    <section class="pt-40 pb-10 bg-white">
      <div class="max-w-4xl mx-auto px-8">
        <!-- Stepper -->
        <div class="stepper mb-10">
          <div class="stepper-step active"><span class="stepper-number">1</span><span class="stepper-label hidden sm:block">Thông Tin</span></div>
          <div class="stepper-line"></div>
          <div class="stepper-step"><span class="stepper-number">2</span><span class="stepper-label hidden sm:block">Giao Hàng</span></div>
          <div class="stepper-line"></div>
          <div class="stepper-step"><span class="stepper-number">3</span><span class="stepper-label hidden sm:block">Thanh Toán</span></div>
        </div>
      </div>
    </section>

    <section class="bg-white pb-20">
      <div class="max-w-4xl mx-auto px-8">
        <div class="grid grid-cols-1 lg:grid-cols-5 gap-12">

          <!-- FORM -->
          <div class="lg:col-span-3">
            <h2 class="font-serif text-2xl text-primary mb-8">Thông Tin Giao Hàng</h2>
            <form id="checkout-form" class="space-y-5">
              <div class="grid grid-cols-2 gap-4">
                <div>
                  <label class="font-ui text-[10px] uppercase tracking-wider text-charcoal block mb-2">Họ *</label>
                  <input type="text" required class="w-full bg-ivory border border-silver-light px-4 py-3 font-ui text-sm focus:outline-none focus:border-gold transition-colors">
                </div>
                <div>
                  <label class="font-ui text-[10px] uppercase tracking-wider text-charcoal block mb-2">Tên *</label>
                  <input type="text" required class="w-full bg-ivory border border-silver-light px-4 py-3 font-ui text-sm focus:outline-none focus:border-gold transition-colors">
                </div>
              </div>
              <div>
                <label class="font-ui text-[10px] uppercase tracking-wider text-charcoal block mb-2">Email *</label>
                <input type="email" required class="w-full bg-ivory border border-silver-light px-4 py-3 font-ui text-sm focus:outline-none focus:border-gold transition-colors">
              </div>
              <div>
                <label class="font-ui text-[10px] uppercase tracking-wider text-charcoal block mb-2">Số Điện Thoại *</label>
                <input type="tel" required class="w-full bg-ivory border border-silver-light px-4 py-3 font-ui text-sm focus:outline-none focus:border-gold transition-colors">
              </div>
              <div>
                <label class="font-ui text-[10px] uppercase tracking-wider text-charcoal block mb-2">Địa Chỉ *</label>
                <input type="text" required class="w-full bg-ivory border border-silver-light px-4 py-3 font-ui text-sm focus:outline-none focus:border-gold transition-colors">
              </div>
              <div class="grid grid-cols-2 gap-4">
                <div>
                  <label class="font-ui text-[10px] uppercase tracking-wider text-charcoal block mb-2">Thành Phố *</label>
                  <input type="text" required class="w-full bg-ivory border border-silver-light px-4 py-3 font-ui text-sm focus:outline-none focus:border-gold transition-colors">
                </div>
                <div>
                  <label class="font-ui text-[10px] uppercase tracking-wider text-charcoal block mb-2">Quận/Huyện</label>
                  <input type="text" class="w-full bg-ivory border border-silver-light px-4 py-3 font-ui text-sm focus:outline-none focus:border-gold transition-colors">
                </div>
              </div>
              <div>
                <label class="font-ui text-[10px] uppercase tracking-wider text-charcoal block mb-2">Ghi Chú</label>
                <textarea rows="3" class="w-full bg-ivory border border-silver-light px-4 py-3 font-ui text-sm focus:outline-none focus:border-gold transition-colors resize-none"></textarea>
              </div>
              <button type="submit" class="btn-primary w-full justify-center mt-4 cursor-pointer">Tiếp Tục →</button>
            </form>
          </div>

          <!-- ORDER SUMMARY -->
          <div class="lg:col-span-2">
            <div class="bg-ivory p-6 sticky top-32">
              <h3 class="font-serif text-lg text-primary mb-6 pb-4 border-b border-silver-light">Đơn Hàng Của Bạn</h3>
              <div id="checkout-items" class="space-y-4 mb-6">
                <p class="text-muted text-sm">Giỏ hàng trống</p>
              </div>
              <div class="border-t border-silver-light pt-4 space-y-2">
                <div class="flex justify-between font-ui text-[11px] text-muted"><span>Tạm tính</span><span id="checkout-subtotal">0₫</span></div>
                <div class="flex justify-between font-ui text-[11px] text-muted"><span>Vận chuyển</span><span>Miễn phí</span></div>
                <div class="flex justify-between font-ui text-sm font-semibold text-primary pt-2 border-t border-silver-light"><span>Tổng cộng</span><span id="checkout-total">0₫</span></div>
              </div>
            </div>
          </div>

        </div>
      </div>
    </section>
  </main>

  <div id="component-footer"></div>
  <footer class="bg-primary"><div class="max-w-6xl mx-auto px-8 py-5 flex flex-col sm:flex-row items-center justify-between gap-3"><p class="font-ui text-[9px] text-white/20">© 2025 Vane Vietnam</p></div></footer>
  <div id="component-cart-overlay"></div>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="src/js/app.js?v=30"></script>
</body>
</html>
