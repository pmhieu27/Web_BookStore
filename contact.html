<!doctype html>
<html lang="vi" class="scroll-smooth">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Liên Hệ | Vane Vietnam</title>
  <meta name="description" content="Liên hệ với Vane Vietnam — showroom, hotline, email." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💎</text></svg>">
  <link rel="stylesheet" href="src/css/base.css?v=30" />
  <link rel="stylesheet" href="src/css/output.css?v=30" />
  <link rel="stylesheet" href="src/css/custom.css?v=30" />
</head>
<body class="bg-ivory text-charcoal font-sans opacity-0 transition-opacity duration-500">

  <div id="loader" class="fixed inset-0 z-200 bg-ivory flex items-center justify-center"><div class="font-logo text-2xl tracking-[0.4em]">VANE</div></div>
  <div id="component-header"></div>

  <main>

    <!-- HEADER -->
    <section class="pt-40 pb-16 bg-white border-b border-silver-light/50">
      <div class="max-w-6xl mx-auto px-8">
        <nav class="mb-8"><ol class="flex items-center gap-2 font-ui text-[10px] tracking-wider text-muted"><li><a href="index.html" class="hover:text-primary transition-colors">Trang Chủ</a></li><li class="text-silver">/</li><li class="text-primary">Liên Hệ</li></ol></nav>
        <p class="font-ui text-[10px] tracking-[0.4em] uppercase text-gold mb-4">Liên Hệ</p>
        <h1 class="font-serif text-4xl md:text-5xl text-primary">Kết Nối Với Chúng Tôi</h1>
      </div>
    </section>

    <!-- CONTENT -->
    <section class="bg-ivory py-20 md:py-28">
      <div class="max-w-6xl mx-auto px-8">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-16">

          <!-- INFO -->
          <div data-reveal="left">
            <h2 class="font-serif text-2xl text-primary mb-8">Thông Tin Liên Hệ</h2>

            <div class="space-y-8">
              <div class="flex gap-4">
                <div class="w-10 h-10 flex items-center justify-center border border-gold/30 text-gold shrink-0">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                </div>
                <div>
                  <p class="font-ui text-[10px] uppercase tracking-wider text-gold mb-1">Showroom</p>
                  <p class="text-sm text-charcoal">123 Đường Đồng Khởi, Quận 1</p>
                  <p class="text-sm text-charcoal">TP. Hồ Chí Minh, Việt Nam</p>
                </div>
              </div>

              <div class="flex gap-4">
                <div class="w-10 h-10 flex items-center justify-center border border-gold/30 text-gold shrink-0">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                </div>
                <div>
                  <p class="font-ui text-[10px] uppercase tracking-wider text-gold mb-1">Hotline</p>
                  <p class="text-sm text-charcoal">+84 28 1234 5678</p>
                  <p class="text-[11px] text-muted">T2 – T7: 9:00 – 20:00</p>
                </div>
              </div>

              <div class="flex gap-4">
                <div class="w-10 h-10 flex items-center justify-center border border-gold/30 text-gold shrink-0">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                </div>
                <div>
                  <p class="font-ui text-[10px] uppercase tracking-wider text-gold mb-1">Email</p>
                  <p class="text-sm text-charcoal">info@vanevietnam.com</p>
                </div>
              </div>
            </div>

            <!-- Map placeholder -->
            <div class="mt-10 aspect-video bg-silver-light overflow-hidden">
              <img src="https://placehold.co/800x450/e0e0e0/888888?text=Google+Maps" alt="Bản đồ" class="w-full h-full object-cover">
            </div>
          </div>

          <!-- FORM -->
          <div data-reveal="right">
            <h2 class="font-serif text-2xl text-primary mb-8">Gửi Tin Nhắn</h2>
            <form id="contact-form" class="space-y-6">
              <div>
                <label class="font-ui text-[10px] uppercase tracking-wider text-charcoal block mb-2">Họ và Tên *</label>
                <input type="text" required class="w-full bg-white border border-silver-light px-4 py-3 font-ui text-sm focus:outline-none focus:border-gold transition-colors">
              </div>
              <div>
                <label class="font-ui text-[10px] uppercase tracking-wider text-charcoal block mb-2">Email *</label>
                <input type="email" required class="w-full bg-white border border-silver-light px-4 py-3 font-ui text-sm focus:outline-none focus:border-gold transition-colors">
              </div>
              <div>
                <label class="font-ui text-[10px] uppercase tracking-wider text-charcoal block mb-2">Số Điện Thoại</label>
                <input type="tel" class="w-full bg-white border border-silver-light px-4 py-3 font-ui text-sm focus:outline-none focus:border-gold transition-colors">
              </div>
              <div>
                <label class="font-ui text-[10px] uppercase tracking-wider text-charcoal block mb-2">Chủ Đề</label>
                <select class="w-full bg-white border border-silver-light px-4 py-3 font-ui text-sm focus:outline-none focus:border-gold transition-colors cursor-pointer">
                  <option>Tư vấn sản phẩm</option>
                  <option>Thiết kế riêng</option>
                  <option>Bảo hành / Sửa chữa</option>
                  <option>Hợp tác</option>
                  <option>Khác</option>
                </select>
              </div>
              <div>
                <label class="font-ui text-[10px] uppercase tracking-wider text-charcoal block mb-2">Nội Dung *</label>
                <textarea required rows="5" class="w-full bg-white border border-silver-light px-4 py-3 font-ui text-sm focus:outline-none focus:border-gold transition-colors resize-none"></textarea>
              </div>
              <button type="submit" class="btn-primary w-full justify-center cursor-pointer">Gửi Tin Nhắn</button>
            </form>
          </div>

        </div>
      </div>
    </section>

  </main>

  <div id="component-footer"></div>
  <footer class="bg-primary"><div class="max-w-6xl mx-auto px-8 py-5 flex flex-col sm:flex-row items-center justify-between gap-3"><p class="font-ui text-[9px] text-white/20">© 2025 Vane Vietnam</p><div class="flex gap-6"><a href="#" class="font-ui text-[9px] text-white/20 hover:text-gold transition-colors">Bảo Mật</a><a href="#" class="font-ui text-[9px] text-white/20 hover:text-gold transition-colors">Điều Khoản</a></div></div></footer>
  <div id="component-cart-overlay"></div>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="src/js/app.js?v=30"></script>
</body>
</html>
