<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Header</title>

  <!-- ICON -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="stylesheet" href="header.css">
</head>
<body>

<!-- HEADER TOP -->
<div class="header-top">
  <div class="container header-flex">

    <!-- LOGO -->
   <div class="logo">
    <img src="logo.jpg" alt="logo">
    <span>VƯỜN SÁCH THƠ</span>
    </div>

    <!-- SEARCH -->
    <div class="search-box">
      <input type="text" placeholder="Tìm kiếm sản phẩm...">
      <i class="fa fa-search"></i>
    </div>

    <!-- RIGHT -->
    <div class="header-right">
      <div class="item">
        <i class="fa fa-phone"></i>
        <div>
          <b>19006656</b><br>
          <span>Hỗ trợ khách hàng</span>
        </div>
      </div>

      <div class="item">
        <i class="fa fa-user"></i>
        <div>
          <b>Đăng nhập</b><br>
          <span>Đăng ký</span>
        </div>
      </div>

      <div class="item cart">
        <i class="fa fa-shopping-cart"></i>
        <span class="badge">0</span>
      </div>
    </div>

  </div>
</div>

<!-- MENU -->
<div class="menu-bar">
  <div class="container">
    <ul class="menu">

      <li><a href="index.html"><span class="emoji">🏠</span>Trang chủ</a></li>

      <li><i class="fa fa-info-circle"></i> Về chúng tôi</li>

      <!-- DROPDOWN -->
      <li class="dropdown">
        <label for="book-toggle">
        <span class="emoji">📚</span>Chuyên mục sách <i class="fa fa-caret-down"></i>
        </label>
        <input type="checkbox" id="book-toggle">

        <ul class="submenu">
          <a href="chuyenmuc.html"><li>Tất cả sản phẩm</li></a>
          <a href="sach-ky-nang.html"><li>Sách kỹ năng</li></a>
          <a href="van-hoc-viet-nam.html"><li>Văn học Việt Nam</li></a>
          <a href="truyen-tranh.html"><li>Truyện tranh</li></a>
        </ul>
      </li>

      <!-- DROPDOWN -->
      <li class="dropdown">
        <label for="news-toggle">
        <span class="emoji">📰</span>Tin tức và sự kiện <i class="fa fa-caret-down"></i>
        </label>
        <input type="checkbox" id="news-toggle">

        <ul class="submenu">
          <li>Tin báo chí</li>
          <li>Sự kiện</li>
        </ul>
      </li>
      <li><i class="fa fa-phone"></i> Liên hệ</li>
    </ul>
  </div>
</div>
</body>
</html>
