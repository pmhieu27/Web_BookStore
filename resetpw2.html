  <div id="loader" class="fixed inset-0 z-200 bg-ivory flex items-center justify-center"><div class="font-logo text-2xl tracking-[0.4em]">VANE</div></div>
 <div id="component-header"></div>
  <main>
    <section class="pt-20 md:pt-32 lg:pt-40 pb-10 bg-white border-b border-silver-light/50">

        <p class="text-muted text-sm max-w-lg leading-relaxed">Khôi phục lại mật khẩu của bạn</p>
      </div>
    </section>
    <section class="lg:max-w-5xl mx-auto rounded-xl py-5 md:py-8">
            <!-- Sửa grid thành grid-cols-1 md:grid-cols-[4fr_6fr] để trên mobile không bị bóp méo form -->
            <div class=" overflow-hidden grid grid-cols-1 md:[grid-template-columns:4fr_6fr] min-h-[400px] rounded-xl gap-2">
          <!-- ẢNH -->
        <div class="px-3 md:px-0 h-60 md:h-full relative">
        <img
          src="https://www.messika.com/media/opti_image/webp/catalog/product/cache/c55b1599846e2e4d518f44ada8803512/m/e/messika_-_outfit_1_1_-_boucles_d_oreilles_cr_oles_move_romane_pm_06689_pg.webp"

          class="w-full h-full object-cover"
        >
        </div>
        <!-- FORM -->
          <div id="otpForm" class="bg-white p-8 md:p-10 flex flex-col justify-center">
            <h2 class="font-serif text-2xl text-primary mb-6">Quên mật khẩu</h2>
            <form id="resetPasswordForm" class="space-y-5">
              <div>
                <label class="font-ui text-[12px] uppercase tracking-wider text-charcoal block mb-2">Nhập mã OTP từ điện thoại</label>
                <input id="otpInput" type="text" pattern="[0-9]*" class="w-full bg-ivory border border-silver-light px-4 py-3 font-ui text-sm focus:outline-none focus:border-gold transition-colors">
              </div>
              <div class="flex gap-5">
                <button type="button" class="btn-primary w-full justify-center cursor-pointer"><a href="resetpw1.html">Quay lại</a></button>
                <button type="submit" class="btn-primary w-full justify-center cursor-pointer">Tiếp theo</button>
              </div>
            </form>
          </div>
      </div>
